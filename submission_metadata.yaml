methodology_summary: >
  A deterministic, high-throughput pipeline designed to rank 100k candidates against
  a specific Job Description under CPU-only and offline constraints. The system extracts
  highly structured semantic, experience, skill, behavioral, career, education, and logistics
  feature groups from streamed JSONL profiles. Multi-pass matching combines BM25 lexical relevance
  with semantic keyphrase matching and a penalty engine for anomaly and honeypot detection.
  Finally, a deterministic reasoning layer generates explainable, evidence-backed explanations
  to satisfy requirements for manual review stages.
